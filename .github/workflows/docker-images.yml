name: Docker images

on:
  push:
    branches:
      - master
    paths:
      - ".env"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository }}

jobs:
  build:
    name: Build ${{ matrix.image }}
    runs-on: ubuntu-latest
    concurrency:
      group: docker-image-${{ matrix.image }}
      cancel-in-progress: false
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        include:
          - image: dnsmap
            context: ./dnsmap
            revision_var: REVISION_DNSMAP
            version_var: VERSION_DNSMAP
          - image: zapret
            context: ./zapret
            revision_var: REVISION_ZAPRET
            version_var: VERSION_ZAPRET
          - image: sing-box
            context: ./sing-box
            revision_var: REVISION_SINGBOX
            version_var: VERSION_SINGBOX

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image version
        id: image
        shell: bash
        run: |
          set -euo pipefail

          source .env
          revision="${!REVISION_VAR}"
          if [[ -z "$revision" ]]; then
            echo "Missing revision for $REVISION_VAR" >&2
            exit 1
          fi

          version="${!VERSION_VAR}"
          if [[ -z "$version" ]]; then
            echo "Missing version for $VERSION_VAR" >&2
            exit 1
          fi

          echo "revision=$revision" >> "$GITHUB_OUTPUT"
          echo "version=${revision}-${version}" >> "$GITHUB_OUTPUT"
        env:
          REVISION_VAR: ${{ matrix.revision_var }}
          VERSION_VAR: ${{ matrix.version_var }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check image
        id: registry
        shell: bash
        run: |
          set -euo pipefail

          image="${REGISTRY}/${IMAGE_NAMESPACE}/${MATRIX_IMAGE}:${IMAGE_VERSION}"
          if docker buildx imagetools inspect "$image" >/dev/null 2>&1; then
            echo "Image already exists: $image"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "Image does not exist yet: $image"
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          IMAGE_VERSION: ${{ steps.image.outputs.version }}
          MATRIX_IMAGE: ${{ matrix.image }}

      - name: Set up QEMU
        if: steps.registry.outputs.exists == 'false'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.registry.outputs.exists == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Build and publish
        if: steps.registry.outputs.exists == 'false'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            REVISION=${{ steps.image.outputs.revision }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:${{ steps.image.outputs.version }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
